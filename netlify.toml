[build]
  functions = "netlify/functions"
  publish = "backend/public"

[[redirects]]
  # Explicit mapping must come BEFORE the generic /api/* rule
  from = "/api/auth/kakao/login"
  to = "/.netlify/functions/auth-kakao-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/ask"
  to = "/.netlify/functions/ai-ask"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/status"
  to = "/.netlify/functions/ai-status"
  status = 200
  force = true

[[redirects]]
  # 푸시 알림 전송 (generic /api/* 보다 먼저 와야 함)
  from = "/api/notifications/send-push"
  to = "/.netlify/functions/notifications-send-push"
  status = 200
  force = true

[[redirects]]
  # 푸시 알림 일괄 전송 (앱 1회 호출 → 서버에서 다수 사용자에게 발송)
  from = "/api/notifications/send-bulk"
  to = "/.netlify/functions/notifications-send-bulk"
  status = 200
  force = true

[[redirects]]
  # Supabase Webhook 경로 (서버→서버, Bot Protection 우회)
  from = "/api/notifications/send-push-webhook"
  to = "/.netlify/functions/notifications-send-push"
  status = 200
  force = true

[[headers]]
  for = "/api/notifications/*"
  [headers.values]
    # Bot protection 우회 (모바일 앱에서 호출)
    X-Robots-Tag = "noindex"

[[redirects]]
  from = "/api/admin/*"
  to = "/.netlify/functions/admin/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/market/*"
  to = "/.netlify/functions/market/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/order/*"
  to = "/order.html"
  status = 200
  force = false

[[redirects]]
  # 개인정보처리방침 (App Store / Google Play 제출용)
  from = "/privacy"
  to = "/privacy.html"
  status = 200
  force = true

[[redirects]]
  from = "/"
  to = "/admin.html"
  status = 200
  force = true

[[redirects]]
from = "/api/auth/kakao/login"
to = "/.netlify/functions/auth-kakao-login"
status = 200
force = true